# =============================================================================
# Grainwatch Controller BFF - Docker Compose Configuration
# =============================================================================
# For local development and testing. Production deployment on Synology should
# use the docker run command or Synology Container Manager UI.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Grainwatch Controller BFF Service
  # ---------------------------------------------------------------------------
  grainwatch-controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grainwatch-controller
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - INFLUXDB_HOST=${INFLUXDB_HOST:-influxdb}
      - INFLUXDB_PORT=${INFLUXDB_PORT:-8086}
      - INFLUXDB_DATABASE=${INFLUXDB_DATABASE:-cornwatch}
      - INFLUXDB_MEASUREMENT=${INFLUXDB_MEASUREMENT:-Temp}
      - INFLUXDB_USERNAME=${INFLUXDB_USERNAME:-}
      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD:-}
      - USERS_FILE_PATH=/app/data/users.json
    volumes:
      # Persist user data outside the container
      - ./data:/app/data:rw
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - grainwatch-network
    depends_on:
      influxdb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # InfluxDB (for local testing only)
  # ---------------------------------------------------------------------------
  # In production on Synology, the BFF connects to the existing InfluxDB
  # container on the same Docker network.
  influxdb:
    image: influxdb:1.8-alpine
    container_name: influxdb-test
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      - INFLUXDB_DB=${INFLUXDB_DATABASE:-cornwatch}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_USERNAME:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD:-adminpassword}
      - INFLUXDB_HTTP_AUTH_ENABLED=true
    volumes:
      - influxdb-data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - grainwatch-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  grainwatch-network:
    driver: bridge
    name: grainwatch-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  influxdb-data:
    name: grainwatch-influxdb-data
