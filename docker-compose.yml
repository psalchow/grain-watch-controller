# =============================================================================
# Grainwatch Controller BFF - Docker Compose Configuration
# =============================================================================
# For local development and testing. Production deployment on Synology should
# use the docker run command or Synology Container Manager UI.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Grainwatch Controller BFF Service
  # ---------------------------------------------------------------------------
  grainwatch-controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grainwatch-controller
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - INFLUXDB_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-grainwatch}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-grainwatch}
      - INFLUXDB_MEASUREMENT=${INFLUXDB_MEASUREMENT:-Temp}
      - USERS_FILE_PATH=/app/data/users.json
    volumes:
      # Persist user data outside the container
      - ./data:/app/data:rw
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - grainwatch-network
    depends_on:
      influxdb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # InfluxDB 2.x (for local testing only)
  # ---------------------------------------------------------------------------
  # In production on Synology, the BFF connects to the existing InfluxDB
  # container on the same Docker network.
  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb-test
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-grainwatch}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-grainwatch}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-test-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - grainwatch-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  grainwatch-network:
    driver: bridge
    name: grainwatch-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  influxdb-data:
    name: grainwatch-influxdb-data
